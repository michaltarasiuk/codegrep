pre-commit:
  jobs:
    - run: bun x prettier --write {staged_files}
      glob: &source-glob
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.json"
        - "**/*.jsonc"
        - "**/*.css"
        - "**/*.svelte"
        - "**/*.astro"
      stage_fixed: true
    - run: bun x ultracite fix
      glob: *source-glob
      stage_fixed: true
    - run: bun run typecheck
